name: "build_zditor"

on:
  push:
    tags:
      - "v*" # 只会在以 v 开头的标签推送时触发
jobs:
  publish-tauri:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above).
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # for Tauri v1 you could replace this with ubuntu-20.04.
            args: ""
          - platform: "windows-latest"
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      # Checkout 主仓库到 zditor，保证本地 file:../zditor-excalidraw 依赖可解析
      - name: Checkout zditor repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.REPO }} # 替换为私有仓库的实际路径
          token: ${{ secrets.DEPLOY_TOKEN }} # 使用 GitHub 提供的 GITHUB_TOKEN 进行身份验证
          path: zditor

      # 优先读取 zditor 仓库中的固定 ref，若缺失则回退到仓库变量 / 默认分支
      - name: Resolve zditor-excalidraw ref
        id: resolve_excalidraw_ref
        shell: bash
        run: |
          EXCALIDRAW_REF=""

          if [ -f "zditor/zditor-excalidraw.ref" ]; then
            EXCALIDRAW_REF="$(tr -d '\r\n' < "zditor/zditor-excalidraw.ref")"
          fi

          if [ -z "$EXCALIDRAW_REF" ]; then
            EXCALIDRAW_REF="${{ vars.EXCALIDRAW_REF }}"
          fi

          echo "Using zditor-excalidraw ref: ${EXCALIDRAW_REF:-<default branch>}"
          echo "ref=$EXCALIDRAW_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout zditor-excalidraw repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.EXCALIDRAW_REPO }}
          token: ${{ secrets.DEPLOY_TOKEN }}
          ref: ${{ steps.resolve_excalidraw_ref.outputs.ref }}
          path: zditor-excalidraw

      # 导入 Apple 证书（仅限 macOS）
      - name: Import Certificate
        if: matrix.platform == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      # 解锁 Keychain（仅限 macOS）
      - name: Unlock keychain
        if: matrix.platform == 'macos-latest'
        run: |
          security set-keychain-password -p ${{ secrets.APPLE_KEYCHAIN_PASSWORD }} login.keychain || true
          security default-keychain -s login.keychain
          security unlock-keychain -p ${{ secrets.APPLE_KEYCHAIN_PASSWORD }} login.keychain

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: zditor/package-lock.json

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './zditor/src-tauri'

      - name: Cache apt packages (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1.0

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install zditor-excalidraw dependencies
        working-directory: zditor-excalidraw
        run: yarn install --frozen-lockfile

      - name: build zditor-excalidraw packages
        working-directory: zditor-excalidraw
        run: yarn build:packages

      - name: install frontend dependencies
        working-directory: zditor
        run: npm install # change this to npm, pnpm or bun depending on which one you use.

      - name: build frontend
        working-directory: zditor
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run build

      # 跳过 ubuntu 平台的 AppImage 构建
      - name: Skip AppImage build for Ubuntu
        if: matrix.platform == 'ubuntu-22.04'
        run: echo "Skipping AppImage build on Ubuntu."

      - name: Get latest release notes from CHANGELOG
        id: get_release_notes
        working-directory: zditor
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF##*/}"
          echo "Current tag: $TAG_NAME"

          RELEASE_BODY=""

          # Check for English, Chinese, and German changelog files
          for CHANGELOG_FILE in "CHANGELOG.md" "CHANGELOG.zh-CN.md" "CHANGELOG.de-DE.md"; do
            if [ -f "$CHANGELOG_FILE" ]; then
              echo "$CHANGELOG_FILE exists, parsing release notes..."

              # Extract content between the current version header and next version header
              VERSION_CONTENT=$(awk -v version="$TAG_NAME" '
                BEGIN { in_version = 0; first_line = 1 }
                /^## / && $2 == version { in_version = 1; next }
                /^## / && in_version { in_version = 0 }
                in_version {
                  if (first_line) {
                    # Skip initial empty lines
                    if (NF) {
                      first_line = 0
                      print
                    }
                  } else {
                    print
                  }
                }
              ' "$CHANGELOG_FILE")

              if [ -n "$VERSION_CONTENT" ]; then
                # Add language header
                if [ "$CHANGELOG_FILE" = "CHANGELOG.md" ]; then
                  RELEASE_BODY="${RELEASE_BODY}## English\n\n${VERSION_CONTENT}\n\n"
                elif [ "$CHANGELOG_FILE" = "CHANGELOG.zh-CN.md" ]; then
                  RELEASE_BODY="${RELEASE_BODY}## 中文\n\n${VERSION_CONTENT}\n\n"
                elif [ "$CHANGELOG_FILE" = "CHANGELOG.de-DE.md" ]; then
                  RELEASE_BODY="${RELEASE_BODY}## Deutsch\n\n${VERSION_CONTENT}\n\n"
                fi

                echo "Raw release notes from $CHANGELOG_FILE:"
                echo "------------------------------------"
                echo "$VERSION_CONTENT"
                echo "------------------------------------"
              fi
            fi
          done

          # Trim leading/trailing whitespace
          RELEASE_BODY_TRIMMED=$(echo -e "$RELEASE_BODY" | sed -e ':a' -e '/./,$!d;/^\n*$/{$d;N;ba' -e '}' -e 's/[[:space:]]*$//')

          if [ -z "$RELEASE_BODY_TRIMMED" ]; then
            RELEASE_BODY_TRIMMED="See the assets to download this version and install."
            echo "No release notes found for this tag, using default message"
          fi

          echo "Final release notes that will be used:"
          echo "------------------------------------"
          echo "$RELEASE_BODY_TRIMMED"
          echo "------------------------------------"

          # Use multiline output format to preserve newlines
          {
            echo 'release_body<<EOF'
            echo "$RELEASE_BODY_TRIMMED"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

  
      # ====== 2. 构建、签名、公证 ======
      - name: Write Apple API Key
        if: matrix.platform == 'macos-latest'
        working-directory: zditor
        run: |
          echo "${{ secrets.APPLE_API_KEY_P8 }}" > ./apple-api-key.p8

      - uses: tauri-apps/tauri-action@v0
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 以下是新增 Apple 签名 / 公证所需
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{secrets.APPLE_TEAM_ID}}

        with:
          projectPath: zditor
          tagName: zditor-v__VERSION__
          releaseName: "Zditor v__VERSION__"
          releaseBody: ${{ steps.get_release_notes.outputs.release_body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # ====== 3. 非 macOS 平台开启 debug ======
      - uses: tauri-apps/tauri-action@v0
        if: matrix.platform != 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: zditor
          tagName: zditor-v__VERSION__
          releaseName: "Zditor v__VERSION__"
          releaseBody: ${{ steps.get_release_notes.outputs.release_body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
